name: supapp
description: "A simple todo web app built with Flutter Web + Supabase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.8.0

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # Data classes
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Navigation
  auto_route: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  auto_route_generator: ^10.0.0
  riverpod_generator: ^3.0.0

flutter:
  uses-material-design: true
